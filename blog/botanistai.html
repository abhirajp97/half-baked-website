<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BotanistAI: An AI Plant Doctor in a Weekend — Half-Baked</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    /* ── TOKENS ────────────────────────────────── */
    :root {
      --bg:          #F0EDE4;
      --ink:         #1A1714;
      --ink-2:       #5A5550;
      --saffron:     #F0A500;
      --indigo:      #1B1464;
      --terra:       #C4632A;
      --forest:      #2D6A4F;
      --line:        rgba(26, 23, 20, 0.12);
      --line-strong: rgba(26, 23, 20, 0.22);
    }

    /* ── RESET ─────────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.7;
      overflow-x: hidden;
    }

    /* ── HEADER ────────────────────────────────── */
    header {
      padding: 1.5rem 4rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 1440px;
      margin: 0 auto;
      border-bottom: 1px solid var(--line);
    }
    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.35rem;
      font-weight: 600;
      color: var(--ink);
      text-decoration: none;
      letter-spacing: -0.01em;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .logo-mark { width: 26px; height: 26px; flex-shrink: 0; }
    nav { display: flex; align-items: center; gap: 2.5rem; }
    nav a {
      color: var(--ink-2);
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      transition: color 0.2s;
    }
    nav a:hover { color: var(--ink); }

    /* ── RAW LINK ──────────────────────────────── */
    .raw-link {
      text-align: right;
      margin-bottom: 2rem;
    }
    .raw-link a {
      color: var(--ink-2);
      text-decoration: none;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      border: 1px solid var(--line-strong);
      padding: 0.3rem 0.75rem;
      transition: all 0.2s;
    }
    .raw-link a:hover { color: var(--ink); border-color: var(--ink); }

    /* ── ARTICLE SHELL ─────────────────────────── */
    article {
      max-width: 720px;
      margin: 0 auto;
      padding: 3.5rem 2rem 7rem;
    }

    /* ── MARKDOWN CONTENT ──────────────────────── */
    .content h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.2rem, 5vw, 3.25rem);
      font-weight: 600;
      line-height: 1.12;
      letter-spacing: -0.025em;
      color: var(--ink);
      margin-bottom: 0.5rem;
    }

    /* Half-Baked #N subtitle line */
    .content h1 + p {
      color: var(--ink-2);
      font-size: 0.875rem;
      font-style: italic;
      margin-bottom: 2.5rem;
    }

    .content h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.85rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 1.15;
      color: var(--ink);
      margin: 3.25rem 0 1.25rem;
    }

    .content h3 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.35rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--ink);
      margin: 2.5rem 0 0.9rem;
    }

    .content p {
      font-size: 1.05rem;
      line-height: 1.82;
      margin-bottom: 1.4rem;
      color: var(--ink);
    }

    .content strong {
      color: var(--ink);
      font-weight: 600;
    }

    .content em { font-style: italic; }

    .content a {
      color: var(--terra);
      text-decoration: underline;
      text-underline-offset: 3px;
      text-decoration-thickness: 1px;
    }
    .content a:hover { color: var(--ink); }

    .content ul, .content ol {
      margin: 1.25rem 0 1.5rem 1.4rem;
    }
    .content li {
      font-size: 1.05rem;
      line-height: 1.75;
      margin-bottom: 0.5rem;
    }

    /* Inline code */
    .content code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.875em;
      background: rgba(26, 23, 20, 0.07);
      padding: 0.18em 0.45em;
    }

    /* Code blocks */
    .content pre {
      background: var(--ink);
      color: #E8E4DC;
      padding: 1.5rem 1.75rem;
      overflow-x: auto;
      margin: 2rem 0;
      font-size: 0.875rem;
      line-height: 1.65;
    }
    .content pre code {
      background: none;
      padding: 0;
      color: inherit;
      font-size: inherit;
    }

    .content blockquote {
      border-left: 3px solid var(--terra);
      padding-left: 1.5rem;
      margin: 2rem 0;
      color: var(--ink-2);
      font-style: italic;
    }

    /* HR — editorial hairline */
    .content hr {
      border: none;
      border-top: 1px solid var(--line);
      margin: 3rem 0;
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 4rem;
      color: var(--ink-2);
      font-style: italic;
    }

    /* ── FOOTER ────────────────────────────────── */
    footer {
      border-top: 1px solid var(--line);
      padding: 2rem 4rem;
      max-width: 1440px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    footer p { color: var(--ink-2); font-size: 0.82rem; }
    footer a { color: var(--ink); text-decoration: none; font-weight: 500; }
    footer a:hover { text-decoration: underline; }

    /* ── RESPONSIVE ────────────────────────────── */
    @media (max-width: 1024px) {
      header, footer { padding-left: 2.5rem; padding-right: 2.5rem; }
    }
    @media (max-width: 640px) {
      header { padding: 1.25rem 1.5rem; flex-wrap: wrap; gap: 1rem; }
      nav { gap: 1.5rem; }
      article { padding: 2.5rem 1.5rem 5rem; }
      footer { padding: 1.5rem; flex-direction: column; gap: 0.75rem; text-align: center; }
    }
  </style>
</head>
<body>

<header>
  <a href="../" class="logo">
    <svg class="logo-mark" viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="13" cy="13" r="12" stroke="#1A1714" stroke-width="1.4"/>
      <circle cx="13" cy="13" r="6.5" stroke="#1A1714" stroke-width="1.4"/>
      <circle cx="13" cy="13" r="2" fill="#1A1714"/>
      <line x1="13" y1="1" x2="13" y2="4.5" stroke="#1A1714" stroke-width="1.4" stroke-linecap="round"/>
      <line x1="25" y1="13" x2="21.5" y2="13" stroke="#1A1714" stroke-width="1.4" stroke-linecap="round"/>
      <line x1="13" y1="25" x2="13" y2="21.5" stroke="#1A1714" stroke-width="1.4" stroke-linecap="round"/>
      <line x1="1" y1="13" x2="4.5" y2="13" stroke="#1A1714" stroke-width="1.4" stroke-linecap="round"/>
    </svg>
    Half-Baked
  </a>
  <nav>
    <a href="../#projects">Projects</a>
    <a href="../#about">About</a>
    <a href="https://github.com/abhirajp97" target="_blank">GitHub</a>
  </nav>
</header>

<article>
  <div class="raw-link">
    <a href="botanistai.md" target="_blank">📄 View raw markdown</a>
  </div>
  <div id="content" class="content">
    <p class="loading">Loading...</p>
  </div>
</article>

<footer>
  <a href="../">← Back to Half-Baked</a>
  <p>Made by <a href="https://github.com/abhirajp97">Abhiraj Parikh</a> · <a href="https://opensource.org/licenses/MIT" target="_blank">MIT licensed</a></p>
</footer>

<script>
  fetch('botanistai.md')
    .then(response => response.text())
    .then(markdown => {
      document.getElementById('content').innerHTML = marked.parse(markdown);
    })
    .catch(() => {
      document.getElementById('content').innerHTML = '<p>Error loading content. <a href="botanistai.md">View the raw markdown instead.</a></p>';
    });
</script>
<script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
